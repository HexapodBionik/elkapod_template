services:
  sim:
    build:
      context: .
      dockerfile: elkapod-ubuntu24-base.Dockerfile
    image: ghcr.io/hexapodbionik/elkapod-ubuntu24-base:latest
    container_name: test1
    command: bash
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    runtime: nvidia
    environment:
      TERM: xterm-256color
      DISPLAY: ${DISPLAY}
      # Force NVIDIA GPU usage
      __NV_PRIME_RENDER_OFFLOAD: 1
      __VK_LAYER_NV_optimus: NVIDIA_only
      __GLX_VENDOR_LIBRARY_NAME: nvidia
      NVIDIA_DRIVER_CAPABILITIES: all
      NVIDIA_VISIBLE_DEVICES: all
      # Gazebo specific settings
      DISABLE_AMDGPU: 1
      SSH_AUTH_SOCK: /run/host-services/ssh-auth.sock
    devices:
      - "/dev/input/:/dev/input/"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/shm:/dev/shm:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
      - ${SSH_AUTH_SOCK}:/run/host-services/ssh-auth.sock
    shm_size: "1g"
